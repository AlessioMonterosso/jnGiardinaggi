<ion-split-pane contentId="main-content" when="md">
  <!-- Sidebar desktop -->
  <ion-menu contentId="main-content" menuId="main-menu">
    <ion-content>
      <div class="sidebar-logo">
        <span class="logo-bolt">⚡</span>
        <span class="logo-text">DAM <span class="logo-green">Impianti</span></span>
        @if (!networkStatus.isOnline()) {
          <span class="offline-dot"></span>
        }
      </div>
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/tabs/home" routerLinkActive="active-link" detail="false">
            <ion-icon slot="start" name="home-outline"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item routerLink="/tabs/agenda" routerLinkActive="active-link" detail="false">
            <ion-icon slot="start" name="calendar-outline"></ion-icon>
            <ion-label>Agenda</ion-label>
          </ion-item>
          <ion-item routerLink="/tabs/clienti" routerLinkActive="active-link" detail="false">
            <ion-icon slot="start" name="people-outline"></ion-icon>
            <ion-label>Clienti</ion-label>
          </ion-item>
          <ion-item routerLink="/tabs/pagamenti" routerLinkActive="active-link" detail="false">
            <ion-icon slot="start" name="card-outline"></ion-icon>
            <ion-label>Pagamenti</ion-label>
          </ion-item>
          <ion-item routerLink="/tabs/lavori" routerLinkActive="active-link" detail="false">
            <ion-icon slot="start" name="construct-outline"></ion-icon>
            <ion-label>Lavori</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Bottom tab bar mobile -->
  <ion-tabs id="main-content">
    <ion-tab-bar slot="bottom" class="mobile-tab-bar">
      <ion-tab-button tab="home" href="/tabs/home">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="agenda" href="/tabs/agenda">
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-label>Agenda</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="clienti" href="/tabs/clienti">
        <ion-icon name="people-outline"></ion-icon>
        <ion-label>Clienti</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="pagamenti" href="/tabs/pagamenti">
        <ion-icon name="card-outline"></ion-icon>
        <ion-label>Pagamenti</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="lavori" href="/tabs/lavori">
        <ion-icon name="construct-outline"></ion-icon>
        <ion-label>Lavori</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-split-pane>
